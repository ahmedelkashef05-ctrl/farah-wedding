<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Farah Wedding Marketplace</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="tatreez-bg"></div>
<div class="page-wrap">

  <div id="nav-root"></div>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <div style="font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.2rem;letter-spacing:0.08em">FARAH</div>
        <h2 id="auth-heading">Welcome Back</h2>
        <p id="auth-subheading">Sign in to continue planning your dream wedding</p>
        <!-- Couple / Vendor toggle -->
        <div class="auth-type-toggle">
          <button class="auth-type-btn active" id="type-couple" onclick="setUserType('couple')">👫 Couple</button>
          <button class="auth-type-btn" id="type-vendor" onclick="setUserType('vendor')">🏪 Vendor</button>
        </div>
      </div>

      <!-- Body -->
      <div class="auth-body">
        <!-- Login / Register tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Log In</button>
          <button class="auth-tab" id="tab-register" onclick="showTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="pane-login">
          <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input class="form-input" type="password" id="login-password" placeholder="••••••••" required />
            </div>
            <div id="login-error" class="form-error" style="margin-bottom:0.8rem;display:none"></div>
            <button class="btn btn-primary btn-block" type="submit">Log In</button>
          </form>
          <div class="auth-divider">or try a demo account</div>
          <div style="display:flex;gap:0.6rem">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="demoLogin('couple')">Demo Couple</button>
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="demoLogin('vendor')">Demo Vendor</button>
          </div>
        </div>

        <!-- Register Form -->
        <div id="pane-register" style="display:none">
          <form id="register-form" onsubmit="doRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <input class="form-input" type="text" id="reg-fname" placeholder="Layla" required />
              </div>
              <div class="form-group">
                <label class="form-label">Last Name</label>
                <input class="form-input" type="text" id="reg-lname" placeholder="Mansour" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 characters" minlength="6" required />
            </div>
            <div id="reg-vendor-field" style="display:none" class="form-group">
              <label class="form-label">Business Name</label>
              <input class="form-input" type="text" id="reg-business" placeholder="Your business name" />
            </div>
            <div id="reg-error" class="form-error" style="margin-bottom:0.8rem;display:none"></div>
            <button class="btn btn-primary btn-block" type="submit">Create Account</button>
            <p style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:0.8rem">
              By signing up you agree to our <a href="#" style="color:var(--crimson)">Terms</a> &amp; <a href="#" style="color:var(--crimson)">Privacy Policy</a>
            </p>
          </form>
        </div>

      </div>
    </div>
  </div>

  <div id="footer-root"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const redirectTo = urlParams.get('redirect') || null;
  let userType = urlParams.get('type') === 'vendor' ? 'vendor' : 'couple';

  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const u = Auth.getCurrentUser();
    window.location.href = redirectTo || (u.type === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html');
  }

  function setUserType(type) {
    userType = type;
    document.getElementById('type-couple').classList.toggle('active', type === 'couple');
    document.getElementById('type-vendor').classList.toggle('active', type === 'vendor');
    document.getElementById('reg-vendor-field').style.display = type === 'vendor' ? 'block' : 'none';
    document.getElementById('auth-heading').textContent = type === 'vendor' ? 'Welcome, Vendor' : 'Welcome Back';
    document.getElementById('auth-subheading').textContent = type === 'vendor'
      ? 'Manage your listings and inquiries'
      : 'Sign in to continue planning your dream wedding';
  }

  function showTab(tab) {
    document.getElementById('pane-login').style.display    = tab === 'login' ? 'block' : 'none';
    document.getElementById('pane-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function afterLogin(user) {
    showToast('مرحباً ' + user.name + '! Welcome back ✦', 'success');
    setTimeout(() => {
      window.location.href = redirectTo || (user.type === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html');
    }, 700);
  }

  function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const res   = Auth.login(email, pass);
    const errEl = document.getElementById('login-error');
    if (!res.ok) { errEl.textContent = res.msg; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    afterLogin(res.user);
  }

  function doRegister(e) {
    e.preventDefault();
    const fname = document.getElementById('reg-fname').value.trim();
    const lname = document.getElementById('reg-lname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-password').value;
    const name  = fname + ' ' + lname;
    const res   = Auth.register(name, email, pass, userType);
    const errEl = document.getElementById('reg-error');
    if (!res.ok) { errEl.textContent = res.msg; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    afterLogin(res.user);
  }

  function demoLogin(type) {
    // Create or login demo user
    const email = `demo_${type}@farah.ps`;
    const pass  = 'demo1234';
    let res = Auth.login(email, pass);
    if (!res.ok) {
      res = Auth.register(type === 'couple' ? 'Layla Mansour' : 'Majd Bishara', email, pass, type);
    }
    if (res.ok) afterLogin(res.user);
  }

  // Initialize type from URL
  setUserType(userType);
</script>
</body>
</html>
